name: Deploy Strategy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Isolate strategy routes for static export
        run: |
          # Remove all non-strategy routes — only /strategy is deployed
          rm -rf app/api app/customer app/internal app/org app/concept
          # Minimal root page (strategy has its own layout/nav)
          printf '"use client";\nexport default function Root() { return null; }\n' > app/page.tsx

      - name: Build static export
        run: npm run build
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_BASE_PATH: /blue-lagoon-cco

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}strategy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
